<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiverse Slavenību Naudas Simulators 6.0</title>
    <style>
        :root {
            --primary: #2ecc71;
            --primary-hover: #27ae60;
            --danger: #e74c3c;
            --danger-hover: #c0392b;
            --bg: #f5f6fa;
            --card-bg: white;
            --text: #2f3640;
            --accent: #9b59b6;
            --header-bg: white;
            --border: #dfe6e9;
            --income: #27ae60;
        }

        [data-theme="dark"] {
            --bg: #1e272e;
            --card-bg: #2f3640;
            --text: #f5f6fa;
            --header-bg: #2f3640;
            --border: #718093;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            transition: background 0.3s, color 0.3s;
        }

        header {
            background: var(--header-bg);
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: background 0.3s;
        }

        h1 {
            margin: 0 0 15px 0;
            font-size: 32px;
            font-weight: 800;
        }

        .header-controls {
            position: absolute;
            top: 25px;
            right: 25px;
        }

        .theme-btn {
            background: none;
            border: 2px solid var(--border);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            color: var(--text);
            font-weight: bold;
            transition: 0.2s;
        }

        .selector-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        select, .multiplier-btn {
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 12px;
            border: 2px solid var(--border);
            background-color: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            font-weight: bold;
            outline: none;
            transition: 0.2s;
        }

        .multiplier-btn.active {
            background-color: #3498db;
            color: white;
            border-color: #2980b9;
        }

        #money-counter {
            font-size: 46px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 5px;
            transition: transform 0.1s ease;
        }

        #passive-income-counter {
            font-size: 16px;
            font-weight: 700;
            color: var(--income);
            margin-bottom: 15px;
            height: 20px;
        }

        .progress-container {
            width: 80%;
            max-width: 600px;
            background-color: #dfe6e9;
            border-radius: 10px;
            margin: 0 auto;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .progress-bar {
            width: 0%;
            height: 15px;
            background: linear-gradient(90deg, #2ecc71, #3498db);
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 13px;
            font-weight: bold;
            color: #7f8c8d;
            margin-top: 5px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .item-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            width: 300px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
        }

        .item-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }

        .item-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .item-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
        }

        .item-name { 
            font-weight: 700; 
            font-size: 20px; 
            margin-bottom: 6px; 
        }

        .item-price { 
            color: var(--danger); 
            font-size: 17px; 
            font-weight: 700;
            margin-bottom: 4px; 
        }

        .item-passive {
            font-size: 12px;
            font-weight: bold;
            color: var(--income);
            margin-bottom: 12px;
            height: 15px;
        }

        .item-count { 
            font-size: 14px; 
            color: var(--text); 
            margin-bottom: 20px; 
            background: rgba(0,0,0,0.05);
            padding: 5px 16px;
            border-radius: 20px;
            font-weight: 700;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            width: 100%;
            margin-top: auto;
        }

        button.action-btn {
            border: none;
            padding: 12px 8px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s ease;
            font-weight: bold;
        }

        .btn-buy { flex: 2; background-color: var(--primary); color: white; }
        .btn-buy:hover:not(:disabled) { background-color: var(--primary-hover); }
        
        .btn-sell { flex: 2; background-color: rgba(0,0,0,0.05); color: var(--text); }
        .btn-sell:hover:not(:disabled) { background-color: var(--danger); color: white; }

        .btn-max { flex: 1; background-color: #e67e22; color: white; }
        .btn-max:hover:not(:disabled) { background-color: #d35400; }
        
        button:disabled { 
            background-color: #ced4da !important; 
            color: #6c757d !important;
            cursor: not-allowed; 
        }

        .achievement-toast {
            position: fixed;
            bottom: -100px;
            right: 20px;
            background: #2c3e50;
            color: white;
            padding: 15px 25px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            border-left: 5px solid var(--accent);
        }

        .achievement-toast.show { bottom: 20px; }
        .achievement-icon { font-size: 30px; }
        .achievement-title { font-weight: bold; color: #f1c40f; font-size: 14px; text-transform: uppercase; }

        .receipt-container {
            background: var(--card-bg);
            max-width: 450px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px dashed var(--border);
            display: none;
        }
        .receipt-title { font-size: 24px; font-weight: 800; margin-bottom: 20px; }
        .receipt-item { display: flex; justify-content: space-between; margin: 10px 0; font-weight: 600; }
        .receipt-total { border-top: 2px solid var(--border); margin-top: 15px; padding-top: 15px; font-size: 20px; font-weight: 800; color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <div class="header-controls">
            <button class="theme-btn" onclick="toggleTheme()">🌙 Tumšais</button>
        </div>
        <h1>Slavenību Naudas Simulators 6.0 💸</h1>
        <div class="selector-container">
            <img id="celeb-avatar" class="avatar" src="https://api.dicebear.com/7.x/adventurer/svg?seed=Elon" alt="Avatar">
            <select id="celebrity-select" onchange="changeCelebrity()">
                <option value="mansa">Mansa Musa ($400,000,000,000,000)</option>
                <option value="rokfellers">John D. Rockefeller ($340,000,000,000,000)</option>
                <option value="elon">Elon Musk ($1,000,000,000,000)</option>
                <option value="bezos">Jeff Bezos ($200,000,000,000)</option>
                <option value="arnault">Bernard Arnault ($190,000,000,000)</option>
                <option value="zuck">Mark Zuckerberg ($170,000,000,000)</option>
                <option value="bill">Bill Gates ($105,000,000,000)</option>
                <option value="mrbeast">MrBeast ($2,600,000,000)</option>
                <option value="ronaldo">Cristiano Ronaldo ($3,000,000,000)</option>
                <option value="taylor">Taylor Swift ($2,000,000,000)</option>
                <option value="messi">Lionel Messi ($600,000,000)</option>
            </select>
            
            <div style="margin-left: 20px; display: inline-flex; gap: 5px;">
                <button class="multiplier-btn active" onclick="setMultiplier(1)" id="m1">x1</button>
                <button class="multiplier-btn" onclick="setMultiplier(10)" id="m10">x10</button>
                <button class="multiplier-btn" onclick="setMultiplier(100)" id="m100">x100</button>
            </div>
        </div>
        <div id="money-counter">$400,000,000,000,000</div>
        <div id="passive-income-counter">Pasīvie ienākumi: +$0 / sek</div>
        
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div id="progress-text" class="progress-text">Iztērēti 0% no kopējās bagātības</div>
    </header>

    <div class="container" id="shop-container"></div>

    <div class="receipt-container" id="receipt">
        <div class="receipt-title">🧾 Tavs Pirkumu Čeks</div>
        <div id="receipt-items"></div>
        <div class="receipt-total" id="receipt-total">Kopā: $0</div>
    </div>

    <div id="achievement-toast" class="achievement-toast">
        <div class="achievement-icon" id="ach-icon">🏆</div>
        <div>
            <div class="achievement-title">Sasniegums atbloķēts!</div>
            <div id="ach-desc">Pirmais pirkums izdarīts!</div>
        </div>
    </div>

    <script>
        const celebrities = {
            mansa: { balance: 400000000000000, img: "https://api.dicebear.com/7.x/adventurer/svg?seed=Musa" },
            rokfellers: { balance: 340000000000000, img: "https://api.dicebear.com/7.x/adventurer/svg?seed=John" },
            elon: { balance: 1000000000000, img: "https://api.dicebear.com/7.x/adventurer/svg?seed=Elon" },
            bezos: { balance: 200000000000, img: "https://api.dicebear.com/7.x/adventurer/svg?seed=Jeff" },
            arnault: { balance: 190000000000, img: "https://api.dicebear.com/7.x/adventurer/svg?seed=Bernard" },
            zuck: { balance: 170000000000, img: "https://api.dicebear.com/7.x/adventurer/svg?seed=Mark" },
            bill: { balance: 105000000000, img: "https://api.dicebear.com/7.x/adventurer/svg?seed=Bill" },
            mrbeast: { balance: 2600000000, img: "https://api.dicebear.com/7.x/adventurer/svg?seed=Beast" },
            ronaldo: { balance: 3000000000, img: "https://api.dicebear.com/7.x/adventurer/svg?seed=Ronaldo" },
            taylor: { balance: 2000000000, img: "https://api.dicebear.com/7.x/adventurer/svg?seed=Taylor" },
            messi: { balance: 600000000, img: "https://api.dicebear.com/7.x/adventurer/svg?seed=Messi" }
        };

        let currentCelebrity = 'mansa';
        let balance = celebrities[currentCelebrity].balance;
        let totalWealth = celebrities[currentCelebrity].balance;
        let currentMultiplier = 1;
        let unlockedAchievements = new Set();
        let passiveIncome = 0;

        const items = [
            { id: 0, name: "🍬 Košļājamā gumija", price: 1, passive: 0, count: 0, img: "https://images.unsplash.com/photo-1575224300306-1b0ada9b6924?auto=format&fit=crop&w=400&q=80" },
            { id: 1, name: "☕ Kafija", price: 4, passive: 0, count: 0, img: "https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=400&q=80" },
            { id: 2, name: "🍔 Big Mac", price: 5, passive: 0, count: 0, img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=400&q=80" },
            { id: 3, name: "🍿 Kino biļete", price: 12, passive: 0, count: 0, img: "https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?auto=format&fit=crop&w=400&q=80" },
            { id: 4, name: "📚 Grāmata", price: 20, passive: 0, count: 0, img: "https://images.unsplash.com/photo-1544947950-fa07a98d237f?auto=format&fit=crop&w=400&q=80" },
            { id: 5, name: "🎮 PS5 Pro", price: 800, passive: 0, count: 0, img: "https://images.unsplash.com/photo-1606813907291-d86efa9b94db?auto=format&fit=crop&w=400&q=80" },
            { id: 6, name: "📱 iPhone 16 Pro", price: 1200, passive: 0, count: 0, img: "https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5?auto=format&fit=crop&w=400&q=80" },
            { id: 7, name: "👟 Dizainera botes", price: 5000, passive: 0, count: 0, img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=400&q=80" },
            { id: 8, name: "🚗 Tesla Model Y", price: 50000, passive: 0, count: 0, img: "https://images.unsplash.com/photo-1619767886558-efdc259cde1a?auto=format&fit=crop&w=400&q=80" },
            { id: 9, name: "💍 Dimanta gredzens", price: 100000, passive: 0, count: 0, img: "https://images.unsplash.com/photo-1605100804763-247f67b3557e?auto=format&fit=crop&w=400&q=80" },
            { id: 10, name: "🏎️ Bugatti Chiron", price: 3000000, passive: 0, count: 0, img: "https://images.unsplash.com/photo-1600706432502-75a0e2b3befe?auto=format&fit=crop&w=400&q=80" },
            { id: 11, name: "🏠 Luksusa māja", price: 5000000, passive: 0, count: 0, img: "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=400&q=80" },
            { id: 12, name: "🍗 KFC franšīze", price: 15000000, passive: 2500, count: 0, img: "https://images.unsplash.com/photo-1513639776629-7b61b0ac23cb?auto=format&fit=crop&w=400&q=80" },
            { id: 13, name: "🛥️ Superjahta", price: 50000000, passive: -3000, count: 0, img: "https://images.unsplash.com/photo-1567899378494-47b22a2ae96a?auto=format&fit=crop&w=400&q=80" },
            { id: 14, name: "🛩️ Privātā lidmašīna", price: 70000000, passive: -5000, count: 0, img: "https://images.unsplash.com/photo-1540962351504-03099e0a754b?auto=format&fit=crop&w=400&q=80" },
            { id: 15, name: "🏙️ Debesskrāpis", price: 300000000, passive: 45000, count: 0, img: "https://images.unsplash.com/photo-1542362567-b07eac790abc?auto=format&fit=crop&w=400&q=80" },
            { id: 16, name: "🖼️ Da Vinči glezna", price: 450000000, passive: 0, count: 0, img: "https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?auto=format&fit=crop&w=400&q=80" },
            { id: 17, name: "🛳️ Kruīza kuģis", price: 930000000, passive: 80000, count: 0, img: "https://images.unsplash.com/photo-1548574505-5e239809ee19?auto=format&fit=crop&w=400&q=80" },
            { id: 18, name: "⚽ Futbola Klubs", price: 4000000000, passive: 250000, count: 0, img: "https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=400&q=80" },
            { id: 19, name: "🚀 Twitter (X)", price: 44000000000, passive: -2500000, count: 0, img: "https://images.unsplash.com/photo-1611605698335-8b15d27e83f9?auto=format&fit=crop&w=400&q=80" },
            { id: 20, name: "🛸 Kosmosa stacija ISS", price: 100000000000, passive: -800000, count: 0, img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=400&q=80" },
            { id: 21, name: "📱 Visi pasaules iPhone", price: 150000000000, passive: 12000000, count: 0, img: "https://images.unsplash.com/photo-1556656793-08538906a9f8?auto=format&fit=crop&w=400&q=80" },
            { id: 22, name: "🔴 Kolonizēt Marsu", price: 500000000000, passive: 50000000, count: 0, img: "https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?auto=format&fit=crop&w=400&q=80" },
            { id: 23, name: "🤖 AI Superdators", price: 2000000000000, passive: 350000000, count: 0, img: "https://images.unsplash.com/photo-1581092921461-eab62e97a780?auto=format&fit=crop&w=400&q=80" },
            { id: 24, name: "⚡ Monako Karaliste", price: 8000000000000, passive: 900000000, count: 0, img: "https://images.unsplash.com/photo-1534447677768-be436bb09401?auto=format&fit=crop&w=400&q=80" },
            { id: 25, name: "🗺️ Neliela Eiropas valsts", price: 45000000000000, passive: 4000000000, count: 0, img: "https://images.unsplash.com/photo-1467269204594-9661b134dd2b?auto=format&fit=crop&w=400&q=80" },
            { id: 26, name: "🇺🇸 ASV Valsts parāds", price: 34000000000000, passive: -5000000000, count: 0, img: "https://images.unsplash.com/photo-1502920514313-52581002a659?auto=format&fit=crop&w=400&q=80" },
            { id: 27, name: "🌍 Planēta Zeme", price: 100000000000000, passive: 15000000000, count: 0, img: "https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?auto=format&fit=crop&w=400&q=80" },
            { id: 28, name: "☀️ Saules sistēma", price: 250000000000000, passive: 50000000000, count: 0, img: "https://images.unsplash.com/photo-1506703719100-a0f3a48c0f86?auto=format&fit=crop&w=400&q=80" },
            { id: 29, name: "🌌 Piena Ceļa Galaktika", price: 400000000000000, passive: 200000000000, count: 0, img: "https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&w=400&q=80" }
        ];

        const counterEl = document.getElementById('money-counter');
        const incomeCounterEl = document.getElementById('passive-income-counter');
        const containerEl = document.getElementById('shop-container');
        const selectEl = document.getElementById('celebrity-select');
        const avatarEl = document.getElementById('celeb-avatar');
        const progressBarEl = document.getElementById('progress-bar');
        const progressTextEl = document.getElementById('progress-text');
        const toastEl = document.getElementById('achievement-toast');
        const achDescEl = document.getElementById('ach-desc');
        const achIconEl = document.getElementById('ach-icon');
        const receiptEl = document.getElementById('receipt');
        const receiptItemsEl = document.getElementById('receipt-items');
        const receiptTotalEl = document.getElementById('receipt-total');

        function formatMoney(num) { 
            return (num < 0 ? "-$" : "$") + Math.abs(num).toLocaleString('en-US'); 
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const targetTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', targetTheme);
            document.querySelector('.theme-btn').innerText = targetTheme === 'dark' ? '☀️ Gaišais' : '🌙 Tumšais';
        }

        function triggerAchievement(id, icon, description) {
            if (!unlockedAchievements.has(id)) {
                unlockedAchievements.add(id);
                achIconEl.innerText = icon;
                achDescEl.innerText = description;
                toastEl.classList.add('show');
                setTimeout(() => toastEl.classList.remove('show'), 4000);
            }
        }

        function setMultiplier(val) {
            currentMultiplier = val;
            document.querySelectorAll('.multiplier-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`m${val}`).classList.add('active');
            updateUI();
        }

        function changeCelebrity() {
            currentCelebrity = selectEl.value;
            balance = celebrities[currentCelebrity].balance;
            totalWealth = celebrities[currentCelebrity].balance;
            avatarEl.src = celebrities[currentCelebrity].img;
            items.forEach(item => item.count = 0);
            unlockedAchievements.clear();
            calculatePassiveIncome();
            updateUI();
        }

        function calculatePassiveIncome() {
            passiveIncome = items.reduce((total, item) => total + (item.count * item.passive), 0);
            if(passiveIncome !== 0) {
                incomeCounterEl.innerText = `Pasīvie ienākumi: ${passiveIncome > 0 ? '+' : ''}${formatMoney(passiveIncome)} / sek`;
                incomeCounterEl.style.color = passiveIncome > 0 ? "var(--income)" : "var(--danger)";
            } else {
                incomeCounterEl.innerText = `Pasīvie ienākumi: $0 / sek`;
                incomeCounterEl.style.color = "var(--text)";
            }
        }

        setInterval(() => {
            if (passiveIncome !== 0) {
                balance += passiveIncome;
                if(balance < 0) balance = 0;
                updateUI();
            }
        }, 1000);

        document.addEventListener('click', function(e) {
            if(!e.target.classList.contains('action-btn')) return;
            const id = parseInt(e.target.dataset.id);
            const item = items.find(i => i.id === id);

            if(e.target.classList.contains('btn-buy')) {
                const totalCost = item.price * currentMultiplier;
                if (balance >= totalCost) {
                    balance -= totalCost;
                    item.count += currentMultiplier;
                }
            } else if(e.target.classList.contains('btn-sell')) {
                const sellAmount = Math.min(item.count, currentMultiplier);
                balance += item.price * sellAmount;
                item.count -= sellAmount;
            } else if(e.target.classList.contains('btn-max')) {
                const maxBuy = Math.floor(balance / item.price);
                if(maxBuy > 0) {
                    balance -= item.price * maxBuy;
                    item.count += maxBuy;
                }
            }

            counterEl.style.transform = "scale(1.03)";
            setTimeout(() => counterEl.style.transform = "scale(1)", 100);
            
            calculatePassiveIncome();
            updateUI();
            
            const spent = totalWealth - balance;
            if (spent > 0) triggerAchievement('first', '🍔', 'Pirmais pirkums izdarīts!');
            if (balance <= 0) triggerAchievement('zero', '📉', 'Pilnīga nulle! Tu iztērēji visu naudu!');
        });

        function updateUI() {
            counterEl.innerText = formatMoney(balance);
            const spent = totalWealth - balance;
            const percentage = ((spent / totalWealth) * 100).toFixed(6);
            progressBarEl.style.width = `${Math.min(percentage, 100)}%`;
            progressTextEl.innerText = `Iztērēti ${percentage}% no kopējās bagātības`;

            items.forEach(item => {
                document.getElementById(`count-${item.id}`).innerText = `Nopirkts: ${item.count}`;
                document.getElementById(`sell-${item.id}`).disabled = item.count <= 0;
                document.getElementById(`buy-${item.id}`).disabled = balance < (item.price * currentMultiplier);
                document.getElementById(`max-${item.id}`).disabled = balance < item.price;
            });

            receiptItemsEl.innerHTML = '';
            let hasItems = false;
            items.forEach(item => {
                if(item.count > 0) {
                    hasItems = true;
                    const div = document.createElement('div');
                    div.className = 'receipt-item';
                    div.innerHTML = `<span>${item.name} x${item.count}</span> <span>${formatMoney(item.price * item.count)}</span>`;
                    receiptItemsEl.appendChild(div);
                }
            });
            receiptEl.style.display = hasItems ? 'block' : 'none';
            receiptTotalEl.innerText = `Kopā iztērēts: ${formatMoney(spent)}`;
        }

        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'item-card';
            
            let passiveText = '';
            if(item.passive > 0) passiveText = `+${formatMoney(item.passive)}/sek`;
            if(item.passive < 0) passiveText = `-${formatMoney(Math.abs(item.passive))}/sek`;

            card.innerHTML = `
                <img class="item-img" src="${item.img}" alt="${item.name}">
                <div class="item-info">
                    <div class="item-name">${item.name}</div>
                    <div class="item-price">${formatMoney(item.price)}</div>
                    <div class="item-passive">${passiveText}</div>
                    <div class="item-count" id="count-${item.id}">Nopirkts: 0</div>
                    <div class="btn-group">
                        <button class="action-btn btn-sell" id="sell-${item.id}" data-id="${item.id}">Pārdot</button>
                        <button class="action-btn btn-buy" id="buy-${item.id}" data-id="${item.id}">Pirkt</button>
                        <button class="action-btn btn-max" id="max-${item.id}" data-id="${item.id}">MAX</button>
                    </div>
                </div>
            `;
            containerEl.appendChild(card);
        });

        updateUI();
    </script>
</body>
</html>
