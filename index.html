<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iztērē Slavenību Naudu</title>
    <style>
        :root {
            --primary: #2ecc71;
            --primary-hover: #27ae60;
            --danger: #e74c3c;
            --danger-hover: #c0392b;
            --bg: #f8f9fa;
            --text: #2d3436;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        header {
            background: white;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            margin: 0 0 15px 0;
            font-size: 28px;
        }

        .selector-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #dfe6e9;
        }

        select {
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 8px;
            border: 2px solid #dfe6e9;
            background-color: white;
            cursor: pointer;
            font-weight: bold;
            outline: none;
            transition: 0.2s;
        }

        select:focus {
            border-color: #3498db;
        }

        #money-counter {
            font-size: 42px;
            font-weight: 800;
            color: var(--primary);
            text-shadow: 1px 1px 0px rgba(0,0,0,0.05);
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .item-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            width: 240px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.06);
        }

        .item-name { 
            font-weight: 700; 
            font-size: 20px; 
            margin-bottom: 8px; 
        }

        .item-price { 
            color: var(--danger); 
            font-size: 16px; 
            font-weight: 600;
            margin-bottom: 15px; 
        }

        .item-count { 
            font-size: 14px; 
            color: #b2bec3; 
            margin-bottom: 20px; 
            background: #f1f2f6;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        button {
            flex: 1;
            border: none;
            padding: 12px;
            font-size: 15px;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
            font-weight: bold;
        }

        .btn-buy { background-color: var(--primary); color: white; }
        .btn-buy:hover { background-color: var(--primary-hover); }
        
        .btn-sell { background-color: #dfe6e9; color: #636e72; }
        .btn-sell:hover:not(:disabled) { background-color: var(--danger); color: white; }
        
        button:disabled { 
            background-color: #e9ecef; 
            color: #ced4da;
            cursor: not-allowed; 
            transform: none !important;
        }
        
        button:active:not(:disabled) { transform: scale(0.95); }
    </style>
</head>
<body>

    <header>
        <h1>Iztērē Slavenību Naudu 💸</h1>
        <div class="selector-container">
            <img id="celeb-avatar" class="avatar" src="https://api.dicebear.com/7.x/adventurer/svg?seed=Elon" alt="Avatar">
            <select id="celebrity-select" onchange="changeCelebrity()">
                <option value="elon">Elon Musk ($268,000,000,000)</option>
                <option value="bill">Bill Gates ($105,000,000,000)</option>
                <option value="taylor">Taylor Swift ($1,300,000,000)</option>
            </select>
        </div>
        <div id="money-counter">$268,000,000,000</div>
    </header>

    <div class="container" id="shop-container"></div>

    <script>
        // Precīzie un atjauninātie dati par slavenību kapitālu
        const celebrities = {
            elon: { balance: 268000000000, img: "https://api.dicebear.com/7.x/adventurer/svg?seed=Elon" },
            bill: { balance: 105000000000, img: "https://api.dicebear.com/7.x/adventurer/svg?seed=Bill" },
            taylor: { balance: 1300000000, img: "https://api.dicebear.com/7.x/adventurer/svg?seed=Taylor" }
        };

        let currentCelebrity = 'elon';
        let balance = celebrities[currentCelebrity].balance;

        // Preču saraksts
        const items = [
            { id: 0, name: "🍔 Big Mac", price: 5, count: 0 },
            { id: 1, name: "📱 iPhone 16 Pro", price: 1200, count: 0 },
            { id: 2, name: "🚗 Tesla Model Y", price: 50000, count: 0 },
            { id: 3, name: "🏠 Luksusa māja", price: 5000000, count: 0 },
            { id: 4, name: "🍗 KFC franšīze", price: 15000000, count: 0 },
            { id: 5, name: "🛩️ Privātā lidmašīna", price: 70000000, count: 0 },
            { id: 6, name: "🖼️ Mona Lizas glezna", price: 900000000, count: 0 },
            { id: 7, name: "🚀 Twitter (X)", price: 44000000000, count: 0 }
        ];

        const counterEl = document.getElementById('money-counter');
        const containerEl = document.getElementById('shop-container');
        const selectEl = document.getElementById('celebrity-select');
        const avatarEl = document.getElementById('celeb-avatar');

        function formatMoney(num) {
            return "$" + num.toLocaleString('en-US');
        }

        function changeCelebrity() {
            currentCelebrity = selectEl.value;
            balance = celebrities[currentCelebrity].balance;
            avatarEl.src = celebrities[currentCelebrity].img;
            
            // Atiestata visus pirkumus mainot tēlu
            items.forEach(item => item.count = 0);
            
            updateUI();
        }

        function updateUI() {
            counterEl.innerText = formatMoney(balance);
            
            items.forEach(item => {
                const countEl = document.getElementById(`count-${item.id}`);
                const sellBtn = document.getElementById(`sell-${item.id}`);
                const buyBtn = document.getElementById(`buy-${item.id}`);
                
                countEl.innerText = `Nopirkts: ${item.count}`;
                
                sellBtn.disabled = item.count <= 0;
                buyBtn.disabled = balance < item.price;
            });
        }

        function buyItem(id) {
            const item = items.find(i => i.id === id);
            if (balance >= item.price) {
                balance -= item.price;
                item.count++;
                updateUI();
            }
        }

        function sellItem(id) {
            const item = items.find(i => i.id === id);
            if (item.count > 0) {
                balance += item.price;
                item.count--;
                updateUI();
            }
        }

        // Izveido veikalu
        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'item-card';
            
            card.innerHTML = `
                <div class="item-name">${item.name}</div>
                <div class="item-price">${formatMoney(item.price)}</div>
                <div class="item-count" id="count-${item.id}">Nopirkts: 0</div>
                <div class="btn-group">
                    <button class="btn-sell" id="sell-${item.id}" onclick="sellItem(${item.id})">Pārdot</button>
                    <button class="btn-buy" id="buy-${item.id}" onclick="buyItem(${item.id})">Pirkt</button>
                </div>
            `;
            
            containerEl.appendChild(card);
        });

        updateUI();
    </script>
</body>
</html>
